        tailwind.config = {

                            primary: '#E8804C',

        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Gowun Dodum', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #root {
            flex: 1;
            min-height: 0;

            padding: 12px 16px 16px;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.04); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }
        .viz-container {
            height: 400px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2rem;
            overflow: hidden;
        }
        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 600px) {
            #root { padding: 8px 10px 12px; }

</head>
<body>

<div class="refresh-notice" role="note">
  🔄 화면이 예전 그대로면 <strong>완전히 새로고침</strong>하세요 —
  Windows <kbd>Ctrl</kbd>+<kbd>F5</kbd> ·
  Mac <kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="logo">🌸 알고리즘 이론 사이트</a>
        <div class="nav-links">
            <a href="index.html">홈</a>
            <a href="search.html">탐색</a>
            <a href="sort.html" class="active">정렬</a>
            <a href="efficiency.html">효율성</a>
            <a href="algorithm-practice.html">연습장</a>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/jsx-source" id="__app_src">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트
        const PlayIcon = ({ size = 20, fill = "none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const PauseIcon = ({ size = 20, fill = "none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        );
        const RotateCcwIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        );
        const TerminalIcon = ({ size = 28 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        );
        const SettingsIcon = ({ size = 12 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="2" y1="14" x2="6" y2="14"></line><line x1="10" y1="8" x2="14" y2="8"></line><line x1="18" y1="16" x2="22" y2="16"></line></svg>
        );

        const App = () => {
            const [array, setArray] = useState([]);
            const [elementCount, setElementCount] = useState(12);
            const [algorithm, setAlgorithm] = useState('bubble');
            const [runState, setRunState] = useState('idle'); // 'idle', 'running', 'paused' 로 상태 세분화
            const [speed, setSpeed] = useState(50);
            const [logs, setLogs] = useState(['정렬 시뮬레이터를 시작할 준비가 되었습니다.']);
            const [indices, setIndices] = useState({ active: [], sorted: [], pivot: null, leftPartition: [], rightPartition: [], iPtr: null, jPtr: null });
            
            const stopRef = useRef(false);
            const isPausedRef = useRef(false); // 일시정지 상태를 추적하는 Ref 추가
            const logEndRef = useRef(null);

            const addLog = (msg) => {
                setLogs((prev) => [...prev, msg]);
            };

            useEffect(() => {
                if (logEndRef.current) {
                    logEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [logs]);

            const resetArray = () => {
                stopRef.current = true;
                isPausedRef.current = false;
                setRunState('idle');
                const newArray = Array.from({ length: elementCount }, () => Math.floor(Math.random() * 100) + 1);
                setArray(newArray);
                setIndices({ active: [], sorted: [], pivot: null, leftPartition: [], rightPartition: [], iPtr: null, jPtr: null });
                setLogs([`${elementCount}개의 무작위 데이터가 생성되었습니다.`]);
            };

            useEffect(() => {
                resetArray();
            }, [elementCount]);

            // 대기 함수 자체를 일시정지 가능하도록 업그레이드
            const sleep = async (s) => {
                const ms = Math.max(100, 2500 - (s * 24));
                let waited = 0;
                while (waited < ms) {
                    if (stopRef.current) return;
                    // 일시정지 상태면 풀릴 때까지 무한 대기
                    while (isPausedRef.current) {
                        if (stopRef.current) return;
                        await new Promise(resolve => setTimeout(resolve, 50));
                    }
                    await new Promise(resolve => setTimeout(resolve, 20));
                    waited += 20;
                }
            };

            const bubbleSort = async () => {
                let arr = [...array];
                let n = arr.length;
                addLog(`버블 정렬을 시작합니다.`);
                for (let i = 0; i < n; i++) {
                    if (stopRef.current) return;
                    addLog(`§ ${i+1}회전 시작`);
                    for (let j = 0; j < n - i - 1; j++) {
                        if (stopRef.current) return;
                        setIndices({ active: [j, j + 1], sorted: Array.from({ length: i }, (_, k) => n - 1 - k), pivot: null });
                        addLog(`${arr[j]}, ${arr[j+1]} 비교중...`);
                        await sleep(speed);
                        if (stopRef.current) return;

                        if (arr[j] > arr[j + 1]) {
                            addLog(`👉 ${arr[j]} > ${arr[j+1]} 이므로 자리를 바꿉니다.`);
                            [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                            setArray([...arr]);
                            await sleep(speed);
                            if (stopRef.current) return;
                        } else {
                            addLog(`✔️ 올바른 순서이므로 그대로 둡니다.`);
                        }
                    }
                    if (stopRef.current) return;
                    addLog(`✅ ${i+1}회전 완료 — 인덱스 [${n-1-i}] 값 ${arr[n-1-i]} 확정`);
                }
                finishSort(n);
            };

            const insertionSort = async () => {
                let arr = [...array];
                let n = arr.length;
                addLog(`삽입 정렬을 시작합니다.`);
                for (let i = 1; i < n; i++) {
                    let key = arr[i];
                    let j = i - 1;
                    if (stopRef.current) return;
                    addLog(`§ ${i}회전 시작 — 기준값: ${key}`);
                    // 이미 정렬된 구간 [0..i-1] 표시
                    const sortedSoFar = Array.from({ length: i }, (_, k) => k);
                    addLog(`[기준] ${key} 삽입 위치 탐색중...`);
                    setIndices({ active: [i], sorted: sortedSoFar, pivot: null });
                    await sleep(speed);
                    if (stopRef.current) return;

                    while (j >= 0 && arr[j] > key) {
                        if (stopRef.current) return;
                        setIndices({ active: [j, j + 1], sorted: sortedSoFar, pivot: null });
                        addLog(`👉 ${arr[j]} > ${key} 이므로 오른쪽으로 밀기`);

                        // 삽입 정렬 표준: arr[j]를 오른쪽으로 한 칸 이동 (스왑으로 구현)
                        [arr[j + 1], arr[j]] = [arr[j], arr[j + 1]];
                        j = j - 1;

                        setArray([...arr]);
                        await sleep(speed);
                        if (stopRef.current) return;
                    }
                    if (stopRef.current) return;
                    addLog(`✔️ 인덱스 [${j + 1}]에 ${key} 삽입`);
                    arr[j + 1] = key;
                    setArray([...arr]);
                    setIndices({ active: [j + 1], sorted: Array.from({ length: i + 1 }, (_, k) => k), pivot: null });
                    await sleep(speed);
                    if (stopRef.current) return;
                    addLog(`✅ ${i}회전 완료 — [0]~[${i}] 구간 정렬됨`);
                }
                finishSort(n);
            };

            const quickSort = async () => {
                let arr = [...array];
                let currentSorted = [];
                let partCount = 0;
                addLog('퀵 정렬 시작 (피봇: 구간의 맨 왼쪽 값)');

                const partition = async (low, high) => {
                    partCount++;
                    const pNum = partCount;
                    // ★ 교과서 방식: 피봇은 항상 구간의 맨 왼쪽(arr[low])
                    let pivot = arr[low];
                    let i = low + 1;  // i: 피봇보다 큰 값을 찾아 →
                    let j = high;     // j: 피봇보다 작은 값을 찾아 ←

                    setIndices(prev => ({ ...prev, pivot: low, iPtr: i, jPtr: j, active: [] }));
                    addLog(`§ partition #${pNum} 시작 — 구간 [${low}~${high}], 피봇=arr[${low}]=${pivot}`);
                    await sleep(speed);
                    if (stopRef.current) return;

                    while (true) {
                        // i 포인터: 피봇 이하인 동안 오른쪽으로 이동
                        while (i <= high && arr[i] <= pivot) {
                            if (stopRef.current) return;
                            setIndices(prev => ({ ...prev, pivot: low, iPtr: i, jPtr: j, active: [] }));
                            addLog(`→ i: arr[${i}]=${arr[i]} ≤ 피봇(${pivot}), i 오른쪽 이동`);
                            await sleep(speed);
                            if (stopRef.current) return;
                            i++;
                        }
                        // i가 멈춤: 피봇보다 큰 값 발견
                        if (i <= high) {
                            setIndices(prev => ({ ...prev, pivot: low, iPtr: i, jPtr: j, active: [] }));
                            addLog(`⏸ i 멈춤: arr[${i}]=${arr[i]} > 피봇(${pivot}) ← 큰 값 발견!`);
                            await sleep(speed);
                            if (stopRef.current) return;
                        }

                        // j 포인터: 피봇 이상인 동안 왼쪽으로 이동
                        while (j > low && arr[j] >= pivot) {
                            if (stopRef.current) return;
                            setIndices(prev => ({ ...prev, pivot: low, iPtr: i, jPtr: j, active: [] }));
                            addLog(`← j: arr[${j}]=${arr[j]} ≥ 피봇(${pivot}), j 왼쪽 이동`);
                            await sleep(speed);
                            if (stopRef.current) return;
                            j--;
                        }
                        // j가 멈춤: 피봇보다 작은 값 발견
                        if (j > low && i <= j) {
                            setIndices(prev => ({ ...prev, pivot: low, iPtr: i, jPtr: j, active: [] }));
                            addLog(`⏸ j 멈춤: arr[${j}]=${arr[j]} < 피봇(${pivot}) ← 작은 값 발견!`);
                            await sleep(speed);
                            if (stopRef.current) return;
                        }

                        // i와 j가 교차하면 분할 종료
                        if (i > j) break;

                        // 교차 전: 큰 값(i) ↔ 작은 값(j) 교환
                        addLog(`👉 큰값 arr[${i}]=${arr[i]} ↔ 작은값 arr[${j}]=${arr[j]} 교환!`);
                        setIndices(prev => ({ ...prev, active: [i, j], iPtr: i, jPtr: j, pivot: low }));
                        await sleep(speed);
                        if (stopRef.current) return;
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                        setArray([...arr]);
                        await sleep(speed);
                        if (stopRef.current) return;

                        i++;
                        j--;
                        setIndices(prev => ({ ...prev, active: [], iPtr: i, jPtr: j, pivot: low }));
                    }

                    // 피봇을 최종 위치(j)로 이동
                    addLog(`🎯 피봇 ${pivot}: arr[${low}]↔arr[${j}] 교환 → 인덱스 [${j}] 확정`);
                    // partition 완료 로그는 setArray 후 추가 (아래)
                    setIndices(prev => ({ ...prev, active: [low, j], iPtr: null, jPtr: null, pivot: null }));
                    await sleep(speed);
                    if (stopRef.current) return;
                    [arr[low], arr[j]] = [arr[j], arr[low]];
                    setArray([...arr]);
                    currentSorted.push(j);
                    setIndices(prev => ({ ...prev, sorted: [...currentSorted], pivot: null, iPtr: null, jPtr: null, active: [] }));
                    addLog(`✅ partition #${pNum} 완료 — 피봇 ${pivot} → 인덱스 [${j}] 영구 확정`);
                    await sleep(speed);
                    if (stopRef.current) return;

                    return j;
                };

                const sort = async (low, high) => {
                    if (low < high) {
                        let pi = await partition(low, high);
                        if (stopRef.current || pi === undefined) return;
                        await sort(low, pi - 1);
                        if (stopRef.current) return;
                        await sort(pi + 1, high);
                    }
                };

                await sort(0, arr.length - 1);
                if (stopRef.current) return;
                finishSort(arr.length);
            };

            const finishSort = (n) => {
                if (stopRef.current) return;
                setIndices({ active: [], sorted: Array.from({ length: n }, (_, k) => k), pivot: null, leftPartition: [], rightPartition: [], iPtr: null, jPtr: null });
                addLog('🎉 모든 정렬 절차가 완료되었습니다.');
                setRunState('idle'); // 완료 시 idle 상태로 복구
            };

            const handleStart = () => {
                if (runState === 'running') {
                    isPausedRef.current = true;
                    setRunState('paused');
                    addLog('⏸️ 시뮬레이션 일시정지');
                } else if (runState === 'paused') {
                    isPausedRef.current = false;
                    setRunState('running');
                    addLog('▶️ 시뮬레이션 이어서 진행');
                } else {
                    stopRef.current = false;
                    isPausedRef.current = false;
                    setRunState('running');
                    if (algorithm === 'bubble') bubbleSort();
                    else if (algorithm === 'insertion') insertionSort();
                    else if (algorithm === 'quick') quickSort();
                }
            };

            return (
                <div className="relative h-full flex flex-col items-center overflow-hidden box-border">
                    <div className="w-full max-w-5xl flex-1 min-h-0 bg-white rounded-[1.25rem] shadow-lg overflow-hidden border-2 border-site-border flex flex-col">
                        
                        {/* 헤더 섹션 */}
                        <div className="flex-shrink-0 bg-gradient-to-r from-site-primary to-[#E5A84B] p-5 md:p-6 text-white text-center">
                            <h1 className="text-xl md:text-2xl font-jua mb-1 flex items-center justify-center gap-2">
                                🔄 정렬 시뮬레이터
                            </h1>
                            <p className="text-white/90 text-sm font-gowun">정렬 이론을 익혔다면, 막대 그래프로 과정을 따라가 보세요</p>
                            <a href="sort.html" className="inline-block mt-3 text-xs font-jua text-white/95 underline underline-offset-2 hover:text-white">← 정렬 이론 페이지로</a>
                        </div>

                        {/* 컨트롤 패널 */}
                        <div className="flex-shrink-0 p-4 md:p-6 border-b border-site-border bg-site-bg">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 items-end">
                                <div className="flex flex-col gap-2">
                                    <label className="text-[10px] font-jua text-[#6B6660] uppercase tracking-widest flex items-center gap-1">
                                        <SettingsIcon /> 알고리즘
                                    </label>
                                    <select 
                                        className="bg-white border border-site-border rounded-2xl p-3 focus:ring-4 focus:ring-[#FFEFD9] outline-none font-bold text-[#2D2A26]"
                                        value={algorithm} onChange={(e) => setAlgorithm(e.target.value)} disabled={runState !== 'idle'}
                                    >
                                        <option value="bubble">버블 정렬 (Bubble)</option>
                                        <option value="insertion">삽입 정렬 (Insertion)</option>
                                        <option value="quick">퀵 정렬 (Quick Sort)</option>
                                    </select>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <label className="text-[10px] font-jua text-[#6B6660] uppercase tracking-widest flex justify-between">
                                        <span>데이터 개수</span>
                                        <span className="text-site-primary font-mono font-bold">{elementCount}</span>
                                    </label>
                                    <input type="range" min="3" max="20" value={elementCount} onChange={(e) => setElementCount(parseInt(e.target.value))} disabled={runState !== 'idle'} className="w-full h-2 bg-site-bg-alt rounded-lg appearance-none cursor-pointer accent-site-primary" />
                                </div>
                                <div className="flex flex-col gap-2">
                                    <label className="text-[10px] font-jua text-[#6B6660] uppercase tracking-widest flex justify-between">
                                        <span>속도</span>
                                        <span className="text-site-primary font-mono font-bold">{speed}%</span>
                                    </label>
                                    <input type="range" min="1" max="100" value={speed} onChange={(e) => setSpeed(parseInt(e.target.value))} className="w-full h-2 bg-site-bg-alt rounded-lg appearance-none cursor-pointer accent-site-primary" />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={resetArray} disabled={runState === 'running'} className="flex-1 p-3 bg-white border border-site-border hover:bg-site-bg-alt disabled:opacity-50 rounded-2xl transition-all shadow-sm flex items-center justify-center gap-2 font-bold text-[#6B6660]">
                                        <RotateCcwIcon size={20} />
                                    </button>
                                    <button onClick={handleStart} className={`flex-[2] min-w-[140px] flex items-center justify-center gap-2 p-3 rounded-2xl font-jua shadow-xl transition-all transform active:scale-95 ${runState === 'running' ? 'bg-rose-500 text-white' : 'bg-site-primary hover:bg-site-primary-dark text-white'}`}>
                                        {runState === 'running' ? <PauseIcon fill="currentColor" /> : <PlayIcon fill="currentColor" />}
                                        <span>{runState === 'running' ? '일시정지' : (runState === 'paused' ? '이어서 시작' : '시작')}</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 하단: 시각화(왼쪽) + 로그(오른쪽) */}
                        <div className="flex-1 min-h-0 flex flex-col md:flex-row overflow-hidden">
                            {/* 시각화 영역 */}
                            <div className="flex-1 min-w-0 flex flex-col overflow-hidden border-r border-site-border">
                                {/* 퀵 정렬 범례 */}
                                {algorithm === 'quick' && (
                                    <div className="flex-shrink-0 flex items-center justify-center gap-3 pt-2 pb-1 flex-wrap">
                                        <span className="flex items-center gap-1 text-[10px] font-bold text-orange-600"><span className="inline-block w-3 h-3 rounded bg-orange-500"></span>피봇</span>
                                        <span className="flex items-center gap-1 text-[10px] font-bold text-sky-600"><span className="inline-block w-3 h-3 rounded bg-sky-500"></span>i (큰 값 탐색 →)</span>
                                        <span className="flex items-center gap-1 text-[10px] font-bold text-rose-600"><span className="inline-block w-3 h-3 rounded bg-rose-500"></span>j (작은 값 탐색 ←)</span>
                                        <span className="flex items-center gap-1 text-[10px] font-bold text-amber-600"><span className="inline-block w-3 h-3 rounded bg-amber-400"></span>교환!</span>
                                        <span className="flex items-center gap-1 text-[10px] font-bold text-emerald-600"><span className="inline-block w-3 h-3 rounded bg-emerald-400"></span>확정</span>
                                    </div>
                                )}
                                <div className="flex-1 min-h-0 viz-container bg-white gap-3 md:gap-4 px-6" style={{ height: algorithm === 'quick' ? '360px' : '400px' }}>
                                {array.map((val, idx) => {
                                    const isPivot = indices.pivot === idx;
                                    const isActive = indices.active?.includes(idx);
                                    const isSorted = indices.sorted?.includes(idx);
                                    const isIPtr = indices.iPtr === idx;
                                    const isJPtr = indices.jPtr === idx;
                                    const isBothPtr = isIPtr && isJPtr;

                                    let barColor = 'bg-site-secondary-light';
                                    let textColor = 'text-site-secondary';
                                    let activeClass = "";

                                    if (isActive) {
                                        barColor = 'bg-amber-400 ring-4 ring-amber-100 shadow-xl';
                                        textColor = 'text-amber-600 font-jua';
                                        activeClass = "scale-110 -translate-y-4";
                                    } else if (isPivot) {
                                        barColor = 'bg-orange-500 ring-4 ring-orange-100';
                                        textColor = 'text-orange-600 font-jua';
                                    } else if (isBothPtr) {
                                        barColor = 'bg-amber-400 ring-4 ring-amber-100';
                                        textColor = 'text-amber-600 font-jua';
                                        activeClass = "scale-105 -translate-y-2";
                                    } else if (isIPtr) {
                                        barColor = 'bg-sky-500 ring-4 ring-sky-100 shadow-lg';
                                        textColor = 'text-sky-600 font-jua';
                                        activeClass = "scale-105 -translate-y-2";
                                    } else if (isJPtr) {
                                        barColor = 'bg-rose-500 ring-4 ring-rose-100 shadow-lg';
                                        textColor = 'text-rose-600 font-jua';
                                        activeClass = "scale-105 -translate-y-2";
                                    } else if (isSorted) {
                                        barColor = 'bg-emerald-400';
                                        textColor = 'text-emerald-600';
                                    } else if (indices.leftPartition?.includes(idx)) {
                                        barColor = 'bg-sky-400 shadow-md';
                                        textColor = 'text-sky-600 font-bold';
                                        activeClass = "-translate-y-1";
                                    } else if (indices.rightPartition?.includes(idx)) {
                                        barColor = 'bg-violet-400 shadow-md';
                                        textColor = 'text-violet-600 font-bold';
                                        activeClass = "-translate-y-1";
                                    }

                                    const ptrLabel = isBothPtr
                                        ? <span className="text-[9px] font-jua text-amber-500">i·j</span>
                                        : isIPtr
                                            ? <span className="text-[9px] font-jua text-sky-500">i→</span>
                                            : isJPtr
                                                ? <span className="text-[9px] font-jua text-rose-500">←j</span>
                                                : null;

                                    return (
                                        <div key={idx} className={`bar-wrapper ${activeClass}`} style={{ width: `${Math.min(15, 60 / array.length)}%` }}>
                                            <div className="h-6 flex items-center justify-center mb-1">
                                                <span className={`text-[10px] md:text-xs font-mono font-bold transition-colors ${textColor}`}>
                                                    {val}
                                                </span>
                                            </div>
                                            <div
                                                style={{ height: `${val * 3}px` }}
                                                className={`w-full max-w-[28px] ${barColor} rounded-t-lg md:rounded-t-xl transition-all duration-300`}
                                            ></div>
                                            <div className="h-4 flex items-center justify-center mt-1">
                                                <span className="text-[9px] md:text-[10px] font-mono text-[#6B6660] opacity-70">
                                                    {idx}
                                                </span>
                                            </div>
                                            <div className="h-5 flex items-center justify-center">
                                                {ptrLabel}
                                            </div>
                                        </div>
                                    );
                                })}
                                </div>
                            </div>

                            {/* 로그 콘솔 - 오른쪽 패널 */}
                            <div className="flex-shrink-0 w-full md:w-80 h-40 md:h-auto flex flex-col bg-[#2D2A26] border-t md:border-t-0 md:border-l border-[#4a4540] overflow-hidden">
                                <div className="flex-shrink-0 flex items-center gap-2 p-3 border-b border-[#4a4540]">
                                    <div className={`w-2 h-2 rounded-full ${runState === 'running' ? 'bg-rose-500 animate-pulse' : 'bg-[#6B6660]'}`} />
                                    <span className="text-[10px] font-jua text-[#6B6660] uppercase tracking-widest">실행 로그</span>
                                </div>
                                <div className="flex-1 min-h-0 overflow-y-auto px-3 py-2 font-mono custom-scrollbar">
                                    {logs.map((log, index) => {
                                        const isRoundHeader = log.startsWith('§');
                                        const displayLog = isRoundHeader ? log.slice(2) : log;
                                        const colorClass = index === logs.length - 1
                                            ? 'text-[#6BAA75] font-bold'
                                            : isRoundHeader
                                                ? 'text-[#E5A84B] font-bold opacity-100'
                                                : 'text-[#6B6660] opacity-70';
                                        return (
                                            <div key={index} className={`py-1 text-xs flex gap-2 ${colorClass}`}>
                                                <span className="text-[#8a8580] select-none shrink-0 w-6">{(index + 1).toString().padStart(2, '0')}</span>
                                                <p className="flex-1 break-words">{isRoundHeader ? `▶ ${displayLog}` : displayLog}</p>
                                            </div>
                                        );
                                    })}
                                    <div ref={logEndRef} />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // @babel/standalone 최신 버전이 JSX를 automatic 런타임(import 구문)으로
        // 변환해 UMD 환경에서 실행이 실패하는 문제를 피하기 위해, 소스를 직접
        // classic 런타임으로 변환해 실행한다.
        (function () {
            var src = document.getElementById('__app_src').textContent;
            var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
            (0, eval)(out);
        })();
    </script>
</body>
</html>
